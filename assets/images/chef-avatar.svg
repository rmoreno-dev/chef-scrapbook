<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Ilustración de perfil de una cocinera">
  <title>Ilustración de perfil de una cocinera</title>

  <!-- Background -->
  <rect width="100" height="100" fill="#FAF5EC"/>

  <!-- Torso: chef uniform -->
  <ellipse cx="50" cy="97" rx="34" ry="22" fill="#E4D5C3"/>
  <!-- Collar V shape -->
  <path d="M36 70 L50 79 L64 70" fill="#FAF5EC" stroke="#C8B49F" stroke-width="1.2"/>
  <!-- Uniform center seam -->
  <line x1="50" y1="79" x2="50" y2="100" stroke="#C8B49F" stroke-width="1"
        stroke-dasharray="2 3" stroke-opacity="0.6"/>
  <!-- Buttons -->
  <circle cx="50" cy="84" r="2" fill="#A8B0BA"/>
  <circle cx="50" cy="91" r="2" fill="#A8B0BA"/>

  <!-- Neck -->
  <rect x="43" y="63" width="14" height="11" rx="4" fill="#E4D5C3"/>

  <!-- Head base -->
  <ellipse cx="50" cy="56" rx="21" ry="22" fill="#E4D5C3"/>

  <!-- Hair: sides peeking below hat brim -->
  <ellipse cx="32" cy="56" rx="8" ry="11" fill="#A68E98" fill-opacity="0.45"/>
  <ellipse cx="68" cy="56" rx="8" ry="11" fill="#A68E98" fill-opacity="0.45"/>

  <!-- Head overlay (covers hair body, keeps face clean) -->
  <ellipse cx="50" cy="56" rx="19" ry="21" fill="#E4D5C3"/>

  <!-- Chef hat brim band -->
  <rect x="27" y="35" width="46" height="9" rx="3" fill="#FAF5EC" stroke="#C8B49F" stroke-width="1.2"/>
  <rect x="27" y="40" width="46" height="2.5" rx="1" fill="#E4D5C3" fill-opacity="0.7"/>

  <!-- Chef hat crown body -->
  <rect x="30" y="10" width="40" height="27" rx="5" fill="#FAF5EC" stroke="#C8B49F" stroke-width="1.2"/>
  <!-- Crown dome top -->
  <ellipse cx="50" cy="12" rx="22" ry="9" fill="#FAF5EC" stroke="#C8B49F" stroke-width="1.2"/>
  <!-- Subtle vertical crease lines -->
  <line x1="39" y1="13" x2="36" y2="35" stroke="#C8B49F" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="61" y1="13" x2="64" y2="35" stroke="#C8B49F" stroke-width="0.7" stroke-opacity="0.4"/>

  <!-- Eyebrows -->
  <path d="M38 50 Q43 47 48 49" fill="none" stroke="#A68E98" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M52 49 Q57 47 62 50" fill="none" stroke="#A68E98" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="43" cy="57" r="3.2" fill="#253245"/>
  <circle cx="57" cy="57" r="3.2" fill="#253245"/>
  <!-- Eye highlights -->
  <circle cx="44.2" cy="55.8" r="1.1" fill="#FAF5EC" fill-opacity="0.75"/>
  <circle cx="58.2" cy="55.8" r="1.1" fill="#FAF5EC" fill-opacity="0.75"/>

  <!-- Nose (minimal, soft) -->
  <path d="M48.5 63.5 Q50 66.5 51.5 63.5" fill="none" stroke="#C8B49F" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M43 70 Q50 77 57 70" fill="none" stroke="#A68E98" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="35" cy="64" rx="6.5" ry="4.5" fill="#A68E98" fill-opacity="0.16"/>
  <ellipse cx="65" cy="64" rx="6.5" ry="4.5" fill="#A68E98" fill-opacity="0.16"/>

  <!-- Decorative: small mauve badge on hat -->
  <circle cx="50" cy="19" r="3.2" fill="#A68E98" fill-opacity="0.28"/>
  <circle cx="50" cy="19" r="1.6" fill="#A68E98" fill-opacity="0.5"/>
</svg>
