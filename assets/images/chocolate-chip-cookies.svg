<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 180" role="img" aria-label="Galletas artesanales con chips de chocolate">
  <title>Galletas artesanales con chips de chocolate</title>
  <defs>
    <filter id="sombra-cookie" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3.5"
                    flood-color="#253245" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="196" height="180" fill="#FAF5EC"/>
  <!-- Warm surface at bottom -->
  <rect x="0" y="150" width="196" height="30" fill="#E4D5C3" fill-opacity="0.3"/>

  <!-- Cooling rack: horizontal wires -->
  <g stroke="#A8B0BA" stroke-width="1.2" stroke-opacity="0.36">
    <line x1="8"  y1="54"  x2="188" y2="54"/>
    <line x1="8"  y1="74"  x2="188" y2="74"/>
    <line x1="8"  y1="94"  x2="188" y2="94"/>
    <line x1="8"  y1="114" x2="188" y2="114"/>
    <line x1="8"  y1="134" x2="188" y2="134"/>
  </g>
  <!-- Cooling rack: vertical wires -->
  <g stroke="#A8B0BA" stroke-width="1.2" stroke-opacity="0.36">
    <line x1="28"  y1="48" x2="28"  y2="142"/>
    <line x1="56"  y1="48" x2="56"  y2="142"/>
    <line x1="84"  y1="48" x2="84"  y2="142"/>
    <line x1="112" y1="48" x2="112" y2="142"/>
    <line x1="140" y1="48" x2="140" y2="142"/>
    <line x1="168" y1="48" x2="168" y2="142"/>
  </g>

  <!-- ── COOKIE 1: main, center-left ── -->
  <g filter="url(#sombra-cookie)">
    <!-- Baked outer ring (almond-dark token) -->
    <circle cx="76" cy="104" r="46" fill="#C8B49F"/>
    <!-- Cookie body -->
    <circle cx="74" cy="101" r="39" fill="#E4D5C3"/>
    <!-- Center highlight -->
    <ellipse cx="71" cy="97" rx="24" ry="22" fill="#FAF5EC" fill-opacity="0.45"/>
  </g>
  <!-- Chips cookie 1 -->
  <ellipse cx="64"  cy="91"  rx="6"   ry="5.2" fill="#253245"/>
  <ellipse cx="64"  cy="91"  rx="2.2" ry="1.5" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="86"  cy="86"  rx="5.8" ry="4.8" fill="#253245"/>
  <ellipse cx="86"  cy="86"  rx="2"   ry="1.4" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="57"  cy="108" rx="5.5" ry="4.8" fill="#253245"/>
  <ellipse cx="57"  cy="108" rx="2"   ry="1.4" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="80"  cy="116" rx="6.2" ry="5"   fill="#253245"/>
  <ellipse cx="80"  cy="116" rx="2.2" ry="1.5" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="97"  cy="104" rx="5.2" ry="4.5" fill="#253245"/>
  <ellipse cx="97"  cy="104" rx="1.9" ry="1.3" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="73"  cy="124" rx="5"   ry="4.2" fill="#253245"/>
  <ellipse cx="73"  cy="124" rx="1.8" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="48"  cy="98"  rx="5"   ry="4.2" fill="#253245"/>
  <ellipse cx="48"  cy="98"  rx="1.8" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>

  <!-- ── COOKIE 2: upper right ── -->
  <g filter="url(#sombra-cookie)">
    <circle cx="152" cy="74" r="38" fill="#C8B49F"/>
    <circle cx="150" cy="71" r="32" fill="#E4D5C3"/>
    <ellipse cx="147" cy="67" rx="19" ry="17" fill="#FAF5EC" fill-opacity="0.45"/>
  </g>
  <!-- Chips cookie 2 -->
  <ellipse cx="142" cy="62" rx="5.5" ry="4.5" fill="#253245"/>
  <ellipse cx="142" cy="62" rx="2"   ry="1.4" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="160" cy="65" rx="5"   ry="4.2" fill="#253245"/>
  <ellipse cx="160" cy="65" rx="1.8" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="145" cy="77" rx="5.5" ry="4.8" fill="#253245"/>
  <ellipse cx="145" cy="77" rx="2"   ry="1.4" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="162" cy="80" rx="5"   ry="4.2" fill="#253245"/>
  <ellipse cx="162" cy="80" rx="1.8" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="134" cy="73" rx="4.8" ry="4"   fill="#253245"/>
  <ellipse cx="134" cy="73" rx="1.7" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="154" cy="90" rx="4.8" ry="4"   fill="#253245"/>
  <ellipse cx="154" cy="90" rx="1.7" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>

  <!-- ── COOKIE 3: lower right, partially cropped ── -->
  <g filter="url(#sombra-cookie)">
    <circle cx="168" cy="152" r="38" fill="#C8B49F"/>
    <circle cx="166" cy="149" r="32" fill="#E4D5C3"/>
    <ellipse cx="162" cy="145" rx="18" ry="16" fill="#FAF5EC" fill-opacity="0.45"/>
  </g>
  <!-- Chips cookie 3 -->
  <ellipse cx="154" cy="138" rx="5.2" ry="4.5" fill="#253245"/>
  <ellipse cx="154" cy="138" rx="1.9" ry="1.3" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="172" cy="140" rx="4.8" ry="4"   fill="#253245"/>
  <ellipse cx="172" cy="140" rx="1.7" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="158" cy="153" rx="5.5" ry="4.8" fill="#253245"/>
  <ellipse cx="158" cy="153" rx="2"   ry="1.4" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="178" cy="157" rx="4.8" ry="4.2" fill="#253245"/>
  <ellipse cx="178" cy="157" rx="1.7" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>
  <ellipse cx="148" cy="156" rx="4.5" ry="4"   fill="#253245"/>
  <ellipse cx="148" cy="156" rx="1.6" ry="1.2" fill="#FAF5EC" fill-opacity="0.22"/>

  <!-- Scattered loose chips (editorial texture) -->
  <ellipse cx="20"  cy="62"  rx="3.5" ry="3"   fill="#253245" fill-opacity="0.55"/>
  <ellipse cx="110" cy="138" rx="3.2" ry="2.8" fill="#253245" fill-opacity="0.50"/>
  <ellipse cx="118" cy="52"  rx="3"   ry="2.5" fill="#253245" fill-opacity="0.48"/>
  <ellipse cx="36"  cy="130" rx="3"   ry="2.5" fill="#253245" fill-opacity="0.48"/>

  <!-- Flour dusting marks (soft ambient texture) -->
  <circle cx="18" cy="98"  r="4.5" fill="#E4D5C3" fill-opacity="0.70"/>
  <circle cx="24" cy="91"  r="3"   fill="#E4D5C3" fill-opacity="0.55"/>
  <circle cx="28" cy="102" r="3.5" fill="#E4D5C3" fill-opacity="0.50"/>
</svg>
