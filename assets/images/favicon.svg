<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Chef Scrapbook">
  <!-- Fondo vainilla con radio -->
  <rect width="64" height="64" rx="14" fill="#FAF5EC"/>
  <!-- Cuerpo del gato -->
  <ellipse cx="32" cy="42" rx="16" ry="14" fill="#E4D5C3"/>
  <!-- Cabeza -->
  <ellipse cx="32" cy="26" rx="13" ry="12" fill="#F5EFE6"/>
  <!-- Orejas -->
  <polygon points="20,18 18,8 25,16" fill="#E4D5C3"/>
  <polygon points="44,18 46,8 39,16" fill="#E4D5C3"/>
  <polygon points="21,17 20,11 25,16" fill="#A68E98" opacity="0.5"/>
  <polygon points="43,17 44,11 39,16" fill="#A68E98" opacity="0.5"/>
  <!-- Ojos -->
  <ellipse cx="26" cy="25" rx="3" ry="2.5" fill="#253245"/>
  <ellipse cx="38" cy="25" rx="3" ry="2.5" fill="#253245"/>
  <circle cx="27" cy="24" r="0.8" fill="#FAF5EC"/>
  <circle cx="39" cy="24" r="0.8" fill="#FAF5EC"/>
  <!-- Nariz -->
  <ellipse cx="32" cy="30" rx="1.5" ry="1" fill="#A68E98"/>
  <!-- Boca -->
  <path d="M29 31.5 Q32 34 35 31.5" stroke="#A68E98" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Bigotes -->
  <line x1="20" y1="29" x2="27" y2="30" stroke="#A8B0BA" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="20" y1="31" x2="27" y2="31" stroke="#A8B0BA" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="37" y1="30" x2="44" y2="29" stroke="#A8B0BA" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="37" y1="31" x2="44" y2="31" stroke="#A8B0BA" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Gorro de chef -->
  <rect x="23" y="13" width="18" height="8" rx="2" fill="#FAF5EC" stroke="#D4DDD0" stroke-width="1"/>
  <rect x="20" y="18" width="24" height="3" rx="1.5" fill="#E4D5C3"/>
  <ellipse cx="32" cy="13" rx="9" ry="6" fill="#FAF5EC" stroke="#D4DDD0" stroke-width="1"/>
  <!-- Corazón pequeño -->
  <path d="M38 7 Q39 5 40.5 6 Q42 7 40.5 9 Z" fill="#A68E98"/>
  <path d="M40.5 6 Q42 5 43 6 Q44 7 42 9 Z" fill="#A68E98"/>
  <path d="M40.5 9 Q41 10 40.5 9 Q40 10 40.5 9Z" fill="#A68E98"/>
</svg>
