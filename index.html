<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef Scrapbook — Inicio</title>
  <meta name="description" content="Chef Scrapbook: tu cuaderno de fórmulas culinarias. Recetas, calculadora de porciones y planificador de menú semanal." />
  <meta name="author" content="Rodolfo Moreno" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

  <!-- Google Fonts: Sistema Vanilla Ink -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Mulish:wght@400;600;700;800&family=Prata&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>

  <!-- Saltar al contenido (accesibilidad) -->
  <a class="skip-link" href="#main-content">Saltar al contenido principal</a>

  <!-- Región live para la calculadora (lectores de pantalla) -->
  <div
    id="calc-live"
    aria-live="polite"
    aria-atomic="true"
    class="sr-only"
  ></div>

  <!-- Contenedor de toasts -->
  <div id="toast-container" aria-live="assertive" hidden></div>

  <!-- ══════════════════════════════════════
       OVERLAY MÓVIL (cierra el sidebar)
  ══════════════════════════════════════ -->
  <div id="nav-overlay" hidden aria-hidden="true"></div>

  <!-- ══════════════════════════════════════
       CABECERA MÓVIL
  ══════════════════════════════════════ -->
  <header class="mobile-header" role="banner">
    <a class="mobile-header__brand" href="#/inicio" aria-label="Chef Scrapbook — Inicio">
      <img src="assets/images/favicon.svg" alt="" width="28" height="28" />
      Chef Scrapbook
    </a>
    <button
      class="mobile-header__btn"
      id="nav-toggle"
      type="button"
      aria-label="Abrir navegación"
      aria-expanded="false"
      aria-controls="sidebar"
    >
      ☰
    </button>
  </header>

  <div class="layout">

    <!-- ══════════════════════════════════════
         SIDEBAR — NAVEGACIÓN
    ══════════════════════════════════════ -->
    <nav class="sidebar" id="sidebar" aria-label="Navegación principal">

      <div class="sidebar__brand">
        <div class="sidebar__logo">
          <img
            src="assets/images/favicon.svg"
            alt=""
            width="48"
            height="48"
          />
        </div>
        <div>
          <p class="sidebar__name">Chef Scrapbook</p>
          <p class="sidebar__tagline">Cocina · Crea · Disfruta</p>
        </div>
      </div>

      <div class="sidebar__nav">
        <ul class="sidebar__nav-list" role="list">
          <li>
            <a
              class="sidebar__nav-link"
              href="#/inicio"
              data-route="/inicio"
            >
              <img class="sidebar__icon" src="assets/icons/home.svg" alt="" width="20" height="20" />
              Inicio
            </a>
          </li>
          <li>
            <a
              class="sidebar__nav-link"
              href="#/recetas"
              data-route="/recetas"
            >
              <img class="sidebar__icon" src="assets/icons/recipe.svg" alt="" width="20" height="20" />
              Recetas
            </a>
          </li>
          <li>
            <a
              class="sidebar__nav-link"
              href="#/menus"
              data-route="/menus"
            >
              <img class="sidebar__icon" src="assets/icons/calendar.svg" alt="" width="20" height="20" />
              Menús
            </a>
          </li>
        </ul>
      </div>

      <div class="sidebar__stamp" aria-hidden="true">
        <img src="assets/branding/brand-stamp.svg" alt="" width="80" height="80" />
      </div>

    </nav>

    <!-- ══════════════════════════════════════
         CONTENIDO PRINCIPAL (SPA mount point)
    ══════════════════════════════════════ -->
    <main class="main-content" id="main-content" tabindex="-1">
      <!-- Las vistas se renderizan aquí mediante el router -->
    </main>

  </div>
  <!-- /layout -->

  <!-- Scripts — orden de carga garantizado -->
  <script src="assets/js/data/recipes.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/pages/home.js"></script>
  <script src="assets/js/pages/recipes.js"></script>
  <script src="assets/js/pages/recipe-detail.js"></script>
  <script src="assets/js/pages/menus.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
