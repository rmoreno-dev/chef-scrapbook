<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef Scrapbook — Inicio</title>
  <meta name="description" content="Chef Scrapbook: tu cuaderno de fórmulas culinarias. Recetas, calculadora de porciones y planificador de menú semanal." />
  <meta name="author" content="Rodolfo Moreno" />
  <meta name="theme-color" content="#FAF5EC" />

  <!-- Favicon oficial -->
  <link rel="icon" href="assets/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">

  <!-- Google Fonts: Sistema Vanilla Ink -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Mulish:wght@400;600;700;800&family=Prata&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos: tokens → activos oficiales → app → componentes → responsive -->
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="css/chef-scrapbook-assets.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>

  <!-- Saltar al contenido (accesibilidad) -->
  <a class="skip-link" href="#main-content">Saltar al contenido principal</a>

  <!-- Región live para la calculadora (lectores de pantalla) -->
  <div
    id="calc-live"
    aria-live="polite"
    aria-atomic="true"
    class="sr-only"
  ></div>

  <!-- Contenedor de toasts -->
  <div id="toast-container" aria-live="assertive" hidden></div>

  <!-- ══════════════════════════════════════
       OVERLAY MÓVIL (cierra el sidebar)
  ══════════════════════════════════════ -->
  <div id="nav-overlay" hidden aria-hidden="true"></div>

  <!-- ══════════════════════════════════════
       CABECERA MÓVIL
  ══════════════════════════════════════ -->
  <header class="mobile-header" role="banner">
    <a class="mobile-header__brand" href="#/inicio" aria-label="Chef Scrapbook — Inicio">
      <picture>
        <source srcset="assets/branding/webp/chef-scrapbook-icon-transparent.webp" type="image/webp">
        <img src="assets/branding/png/chef-scrapbook-icon-transparent.png" alt="" width="28" height="28">
      </picture>
      Chef Scrapbook
    </a>
    <button
      class="mobile-header__btn"
      id="nav-toggle"
      type="button"
      aria-label="Abrir navegación"
      aria-expanded="false"
      aria-controls="sidebar"
    >
      <img src="assets/icons/svg/icon-menu.svg" alt="" width="22" height="22" aria-hidden="true">
    </button>
  </header>

  <div class="layout">

    <!-- ══════════════════════════════════════
         SIDEBAR — NAVEGACIÓN
    ══════════════════════════════════════ -->
    <nav class="sidebar" id="sidebar" aria-label="Navegación principal">

      <div class="sidebar__brand">
        <picture class="sidebar__brand-picture">
          <source
            srcset="assets/branding/webp/chef-scrapbook-logo-horizontal-transparent.webp"
            type="image/webp"
          >
          <img
            src="assets/branding/png/chef-scrapbook-logo-horizontal-transparent.png"
            class="cs-brand-logo sidebar__brand-logo"
            alt="Chef Scrapbook — Cocina, crea y disfruta"
            width="360"
            height="180"
          >
        </picture>
      </div>

      <div class="sidebar__nav">
        <ul class="sidebar__nav-list" role="list">
          <li>
            <a
              class="sidebar__nav-link"
              href="#/inicio"
              data-route="/inicio"
            >
              <img class="sidebar__icon" src="assets/icons/svg/icon-home.svg" alt="" width="20" height="20" />
              Inicio
            </a>
          </li>
          <li>
            <a
              class="sidebar__nav-link"
              href="#/recetas"
              data-route="/recetas"
            >
              <img class="sidebar__icon" src="assets/icons/svg/icon-recipe.svg" alt="" width="20" height="20" />
              Recetas
            </a>
          </li>
          <li>
            <a
              class="sidebar__nav-link"
              href="#/menus"
              data-route="/menus"
            >
              <img class="sidebar__icon" src="assets/icons/svg/icon-calendar.svg" alt="" width="20" height="20" />
              Menús
            </a>
          </li>
        </ul>
      </div>

      <div class="sidebar__stamp" aria-hidden="true">
        <img src="assets/decorative/svg/brand-stamp.svg" alt="" width="80" height="80" />
      </div>

    </nav>

    <!-- ══════════════════════════════════════
         CONTENIDO PRINCIPAL (SPA mount point)
    ══════════════════════════════════════ -->
    <main class="main-content" id="main-content" tabindex="-1">
      <!-- Las vistas se renderizan aquí mediante el router -->
    </main>

  </div>
  <!-- /layout -->

  <!-- Scripts — orden de carga garantizado -->
  <script src="assets/js/data/recipes.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/pages/home.js"></script>
  <script src="assets/js/pages/recipes.js"></script>
  <script src="assets/js/pages/recipe-detail.js"></script>
  <script src="assets/js/pages/menus.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
